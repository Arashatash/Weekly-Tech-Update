name: Weekly Signal Briefing

on:
  schedule:
    - cron: '0 22 * * THU'   # Thursday 10pm UTC = Friday 8am AEST (Sydney)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CI: true
          GITHUB_USERNAME: Arashatash
          REPO_NAME: Weekly-Tech-Update
        run: python generate.py

      - name: Commit history to main
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history/
          git commit -m "chore: archive briefing history" || true
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: false
          commit_message: "briefing: week ${{ github.run_number }}"
